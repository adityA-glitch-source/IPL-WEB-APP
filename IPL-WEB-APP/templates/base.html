<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}IPL Stats{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f14;
      --surface:  #161b25;
      --card:     #1e2535;
      --border:   #2a3147;
      --accent:   #f0a500;
      --accent2:  #e05c2a;
      --text:     #e8eaf0;
      --muted:    #7a85a0;
      --font-head: 'Barlow Condensed', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
    }

    /* ---------- NAV ---------- */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      font-family: var(--font-head);
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 1px;
      color: var(--accent);
      text-decoration: none;
    }
    .nav-brand span { color: var(--text); }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color .2s;
    }
    nav a:hover, nav a.active { color: var(--accent); }

    /* ---------- LAYOUT ---------- */
    .container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }
    .page-title {
      font-family: var(--font-head);
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 1.5rem;
      color: var(--text);
    }
    .page-title span { color: var(--accent); }

    /* ---------- CARDS ---------- */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card-title {
      font-family: var(--font-head);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .5px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    /* ---------- STAT GRID ---------- */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 1rem;
    }
    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
    }
    .stat-box .val {
      font-family: var(--font-head);
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }
    .stat-box .lbl {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.3rem;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    /* ---------- FORM ELEMENTS ---------- */
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-end;
      margin-bottom: 1.5rem;
    }
    .form-group { display: flex; flex-direction: column; gap: .4rem; }
    label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    select, input[type="text"] {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: .6rem .9rem;
      border-radius: 6px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      min-width: 200px;
      appearance: none;
    }
    select:focus, input:focus { outline: 2px solid var(--accent); border-color: transparent; }
    .btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: .65rem 1.5rem;
      border-radius: 6px;
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .5px;
      cursor: pointer;
      transition: background .2s;
    }
    .btn:hover { background: #ffb822; }

    /* ---------- TABLE ---------- */
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th {
      font-family: var(--font-head);
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: .5px;
      padding: .6rem .8rem;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }
    td { padding: .6rem .8rem; border-bottom: 1px solid var(--border); color: var(--text); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(240,165,0,.04); }

    /* ---------- BADGE ---------- */
    .badge {
      background: rgba(240,165,0,.15);
      color: var(--accent);
      border: 1px solid rgba(240,165,0,.3);
      border-radius: 4px;
      padding: .15rem .5rem;
      font-size: 0.78rem;
      font-weight: 500;
    }

    /* ---------- SECTION HEAD ---------- */
    .section-head {
      font-family: var(--font-head);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
      margin: 1.5rem 0 .8rem;
      padding-bottom: .4rem;
      border-bottom: 2px solid var(--accent);
      display: inline-block;
    }

    /* ---------- EMPTY STATE ---------- */
    .empty { color: var(--muted); padding: 2rem; text-align: center; font-size: 0.95rem; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav>
    <a class="nav-brand" href="/"><span>IPL</span> STATS</a>
    <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Home</a>
    <a href="/teamvteam" {% if request.path == '/teamvteam' %}class="active"{% endif %}>Head-to-Head</a>
    <a href="/team" {% if request.path == '/team' %}class="active"{% endif %}>Teams</a>
    <a href="/batsman" {% if request.path == '/batsman' %}class="active"{% endif %}>Batsman</a>
    <a href="/bowler" {% if request.path == '/bowler' %}class="active"{% endif %}>Bowler</a>
    <a href="/season" {% if request.path == '/season' %}class="active"{% endif %}>Seasons</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
